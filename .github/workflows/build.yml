name: Node.js Addon with CMake

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  workflow_dispatch:

env:
  BUILD_TYPE: Release

jobs:
  build:
    name: build (${{ matrix.runner.arch }}, node-${{ matrix.node-version }})
    runs-on: ${{ matrix.runner.os }}
    strategy:
      fail-fast: false
      matrix:
        node-version: [22.x, 24.x, 25.x]
        runner:
          - { os: ubuntu-latest,     arch: x64 }
          - { os: ubuntu-24.04-arm,  arch: arm64 }

    steps:
    # Checkout repo and submodules
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: recursive

    # Cache CMake build files (keyed on arch so x64 and arm64 don't collide)
    - name: Cache CMake build
      uses: actions/cache@v4
      with:
        path: |
          build
          ~/.cmake
        key: ${{ runner.os }}-${{ matrix.runner.arch }}-cmake-${{ hashFiles('CMakeLists.txt', 'core-abi/**') }}
        restore-keys: |
          ${{ runner.os }}-${{ matrix.runner.arch }}-cmake-

    # Setup Node.js
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'

    # Install dependencies
    - name: Install dependencies
      run: npm ci

    # Build native module
    - name: Build Linux native module
      run: npm run build:linux

    # Build TypeScript
    - name: Build TypeScript
      run: npm run build

    # Run tests
    - name: Run tests
      run: npm test

    - name: Run coverage tests
      if: matrix.node-version == '22.x' && matrix.runner.arch == 'x64'
      run: npm run test:coverage

    - name: Upload coverage to Coveralls
      if: matrix.node-version == '22.x' && matrix.runner.arch == 'x64'
      uses: coverallsapp/github-action@v2
      env:
        COVERALLS_REPO_TOKEN: ${{ secrets.COVERALLS_REPO_TOKEN }}
      with:
        github-token: ${{ secrets.GITHUB_TOKEN }}

    # Upload build artifacts on failure for debugging
    - name: Upload build logs on failure
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: build-logs-${{ matrix.runner.arch }}-node-${{ matrix.node-version }}
        path: |
          build/**/*.log
          npm-debug.log*
        if-no-files-found: ignore

  bun-test:
    name: bun-test (${{ matrix.runner.arch }})
    runs-on: ${{ matrix.runner.os }}
    strategy:
      fail-fast: false
      matrix:
        runner:
          - { os: ubuntu-latest,     arch: x64 }
          - { os: ubuntu-24.04-arm,  arch: arm64 }

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Cache CMake build
      uses: actions/cache@v4
      with:
        path: |
          build
          ~/.cmake
        key: ${{ runner.os }}-${{ matrix.runner.arch }}-cmake-bun-${{ hashFiles('CMakeLists.txt', 'core-abi/**') }}
        restore-keys: |
          ${{ runner.os }}-${{ matrix.runner.arch }}-cmake-bun-

    - name: Setup Bun
      uses: oven-sh/setup-bun@v2

    # Bun needs Node.js for cmake-js (node-gyp dependency)
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 24.x

    - name: Install dependencies
      run: bun install

    - name: Build Linux native module
      run: bun run build:linux

    - name: Build TypeScript
      run: bun run build

    - name: Run tests
      run: bun run test

    # Upload build artifacts on failure for debugging
    - name: Upload build logs on failure
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: build-logs-bun-${{ matrix.runner.arch }}
        path: |
          build/**/*.log
        if-no-files-found: ignore
